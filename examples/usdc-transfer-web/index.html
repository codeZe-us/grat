<!doctype html>
<html lang="en" autocomplete="off">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grat | USDC Transfer Demo</title>
    <script>
      if (window.navigator && window.navigator.credentials) {
        const _get = window.navigator.credentials.get;
        window.navigator.credentials.get = function(o) {
          if (o && (o.publicKey || o.password || o.mediation)) {
            return Promise.reject(new Error('Disabled'));
          }
          return _get.apply(this, arguments);
        };
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
  </head>
  <body autocomplete="off" data-lpignore="true">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
