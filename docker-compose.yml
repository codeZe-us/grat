
services:
  relay:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:000000@postgres:5432/grat?sslmode=disable
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - grat-network

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - grat-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=000000
      - POSTGRES_DB=grat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - grat-network

networks:
  grat-network:
    name: grat-network

volumes:
  redis-data:
  postgres-data:
