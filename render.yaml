services:
  # The Grat Relay Service
  - type: web
    name: grat-relay
    runtime: docker
    dockerContext: .
    dockerfilePath: packages/server/Dockerfile
    plan: free # Use the free tier
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: NETWORK
        value: testnet
      - key: DATABASE_URL
        fromDatabase:
          name: grat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: grat-redis
          property: connectionString
      - key: CHANNEL_SEED_PHRASE
        generateValue: true # You will need to replace this with a real testnet seed phrase in the Render UI
      - key: ADMIN_TOKEN
        generateValue: true

# The PostgreSQL Database
databases:
  - name: grat-db
    plan: free

# The Redis Instance
interfaces:
  - type: redis
    name: grat-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
